spring:
  application:
    name: horadocort-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/horadocort}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: America/Sao_Paulo
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-troque-em-producao-com-pelo-menos-32-caracteres}
    expiration-hours: 24
  defaults:
    opening-hour: 9
    closing-hour: 19
    slot-duration-minutes: 30
    reminder-window-minutes: 60

relayos:
  base-url: ${RELAYOS_BASE_URL:https://api.relayos.com.br}
  api-key: ${RELAYOS_API_KEY:}
  templates:
    booking-confirmed: ${RELAYOS_TEMPLATE_CONFIRMED:booking_confirmed}
    booking-reminder: ${RELAYOS_TEMPLATE_REMINDER:booking_reminder}
    barber-notification: ${RELAYOS_TEMPLATE_BARBER:barber_new_booking}

logging:
  level:
    com.horadocort: DEBUG
